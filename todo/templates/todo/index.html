<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Todo List</title>
  </head>
  <body>
    <h1>Todo List</h1>

    <form method="post">
      {% csrf_token %}
      <input type="text" name="title" placeholder="New todo" required>
      <button type="submit">Add</button>
    </form>

    <ul>
      {% for t in todos %}
        <li>{% if t.completed %}<s>{{ t.title }}</s>{% else %}{{ t.title }}{% endif %} - {{ t.created_at }}</li>
      {% empty %}
        <li>No todos yet.</li>
      {% endfor %}
    </ul>
  </body>
</html>
