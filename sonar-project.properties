# Basic Project Info
sonar.projectKey=my-django-app
sonar.projectName=My Django Project
sonar.language=py
sonar.sources=.
sonar.exclusions=**/migrations/**, **/static/**, venv/**, manage.py

# 2. Python specific settings
# Tell Sonar which version of Python you are using
sonar.python.version=3.12.3

# 3. Test Coverage (Crucial for Django)
# Point to the XML report generated by 'pytest-cov' or 'coverage.py'
sonar.python.coverage.reportPaths=coverage.xml